<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smart Disaster Response</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-container">

    <!-- Header -->
    <div class="auth-header">
      <span class="logo-icon">🚨</span>
      <h1>Smart Disaster Response</h1>
      <p>Coordination System — Log in to continue</p>
    </div>

    <!-- Body -->
    <div class="auth-body">
      <h2>Sign In</h2>

      <!-- Role Selector -->
      <p style="font-size:0.85rem;color:#666;margin-bottom:12px;">Select your role:</p>
      <div class="role-selector">
        <button class="role-btn active" data-role="user" onclick="selectRole('user', this)">
          <span class="role-icon">👤</span>Citizen
        </button>
        <button class="role-btn" data-role="volunteer" onclick="selectRole('volunteer', this)">
          <span class="role-icon">🤝</span>Volunteer
        </button>
      </div>

      <!-- Alert -->
      <div id="alertBox"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" tabindex="-1">👁️</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script>
    // Role selection UI (cosmetic — actual role stored on user profile)
    let selectedRole = 'user';

    function selectRole(role, btn) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // Expose for auth.js
    window.getSelectedRole = () => selectedRole;
  </script>

</body>
</html>
