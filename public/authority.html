<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authority Dashboard — Smart Disaster Response</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* Authority-specific overrides */
    .navbar { background: #1d3557; }
    .stat-card { border-top-color: #1d3557; }
    .page-header h1 { color: #1d3557; }

    /* Edit user modal */
    #editUserModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .edit-modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      position: relative;
    }
    .edit-modal-box label {
      font-size: 0.83rem;
      font-weight: 600;
      color: #475569;
      display: block;
      margin-bottom: 5px;
    }
    .edit-modal-box input[type="text"],
    .edit-modal-box input[type="tel"],
    .edit-modal-box input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-modal-box input:focus {
      border-color: #1d3557;
    }

    /* Map for authority */
    #authorityMap {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="brand">
      <span class="icon">🏛️</span>
      Authority Control Panel
    </div>
    <nav>
      <a href="authority.html">Dashboard</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="page-wrapper">

    <div class="page-header">
      <h1>🏛️ Authority Dashboard</h1>
      <p id="authorityName">Loading…</p>
    </div>

    <!-- Filter & Requests Table -->
    <div class="card" style="margin-bottom: 28px;">
      <div class="section-header">
        <h2>All Emergency Requests</h2>
        <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh</button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <select id="filterStatus">
          <option value="all">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="Completed">Completed</option>
        </select>
        <select id="filterType">
          <option value="all">All Types</option>
          <option value="Flood">Flood</option>
          <option value="Fire">Fire</option>
          <option value="Earthquake">Earthquake</option>
          <option value="Cyclone">Cyclone</option>
          <option value="Landslide">Landslide</option>
          <option value="Medical Emergency">Medical Emergency</option>
          <option value="Building Collapse">Building Collapse</option>
          <option value="Chemical Spill">Chemical Spill</option>
          <option value="Tsunami">Tsunami</option>
          <option value="Other">Other</option>
        </select>
        <select id="filterSeverity">
          <option value="all">All Severities</option>
          <option value="Critical">Critical</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>

      <div id="alertBox"></div>
      <div id="loadingSpinner" class="spinner"></div>

      <!-- Table -->
      <div class="table-wrap" id="tableContainer"></div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card red">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">Total Requests</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-number" id="statPending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card green">
        <div class="stat-number" id="statCompleted">—</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-number" id="statCritical">—</div>
        <div class="stat-label">Critical</div>
      </div>
    </div>

    <!-- Map overview -->
    <div class="card map-wrap" style="padding:20px;">
      <h3>🗺️ All Request Locations</h3>
      <p style="color:#888;font-size:0.85rem;margin:4px 0 14px;">Pins show all active emergency locations.</p>
      <div id="authorityMap"></div>
    </div>

    <!-- Users Section -->
    <div style="display: flex; flex-direction: column; gap: 28px; margin-bottom: 28px;">
      <!-- Citizens -->
      <div class="card" style="padding:0;">
        <div class="section-header" style="margin-bottom:0; border-bottom:1px solid #f1f5f9; padding:20px;">
          <h3 style="margin:0; font-size:1.15rem; color:#1e293b;">👤 Active Citizens</h3>
          <input type="text" id="searchCitizens" placeholder="Search citizens..." style="padding:8px 14px; border:1px solid #cbd5e1; border-radius:6px; font-size:0.85rem; width:220px; outline:none; background:#f8fafc;">
        </div>
        <div class="table-wrap" id="citizensContainer" style="max-height: 400px; overflow-y: auto;">
          <div class="spinner" style="margin:20px auto;"></div>
        </div>
      </div>
      <!-- Volunteers -->
      <div class="card" style="padding:0;">
        <div class="section-header" style="margin-bottom:0; border-bottom:1px solid #f1f5f9; padding:20px;">
          <h3 style="margin:0; font-size:1.15rem; color:#1e293b;">🤝 Active Volunteers</h3>
          <input type="text" id="searchVolunteers" placeholder="Search volunteers..." style="padding:8px 14px; border:1px solid #cbd5e1; border-radius:6px; font-size:0.85rem; width:220px; outline:none; background:#f8fafc;">
        </div>
        <div class="table-wrap" id="volunteersContainer" style="max-height: 400px; overflow-y: auto;">
          <div class="spinner" style="margin:20px auto;"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Edit User Modal -->
  <div id="editUserModal">
    <div class="edit-modal-box">
      <button onclick="closeEditModal()"
              style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#94a3b8;line-height:1;">✕</button>
      <h3 style="margin-bottom:22px;color:#1d3557;font-size:1.1rem;">✏️ Edit User</h3>
      <input type="hidden" id="editUserId">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label for="editName">Name</label>
          <input type="text" id="editName" placeholder="Full name">
        </div>
        <div>
          <label for="editPhone">Phone</label>
          <input type="tel" id="editPhone" placeholder="Phone number">
        </div>
        <div>
          <label for="editPassword">Password</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="password" id="editPassword" placeholder="Enter new password" style="flex:1;">
            <button type="button" id="toggleEditPwd"
                    onclick="const p=document.getElementById('editPassword');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'👁️':'🙈';"
                    style="background:none;border:1px solid #cbd5e1;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:1rem;white-space:nowrap;">👁️</button>
          </div>
        </div>
      </div>
      <div id="editModalAlert"></div>
      <div style="display:flex;gap:10px;margin-top:22px;justify-content:flex-end;">
        <button onclick="closeEditModal()"
                style="padding:9px 20px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;font-size:0.9rem;cursor:pointer;color:#475569;font-weight:600;">
          Cancel
        </button>
        <button id="saveUserBtn" onclick="saveUser()"
                style="padding:9px 20px;background:#1d3557;color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;font-weight:600;">
          💾 Save Changes
        </button>
      </div>
    </div>
  </div>

  <script>
    // Define the map globally so the callback ALWAYS exists
    window.authorityMap = null;
    window.initAuthorityMap = function () {
      window.authorityMap = new google.maps.Map(document.getElementById('authorityMap'), {
        center: { lat: 20, lng: 0 },
        zoom: 2,
        mapTypeControl: false
      });
      // If requests are already fetched, plot them
      if (window.pendingRequestsToPlot) {
        window.plotMapMarkersGlobal(window.pendingRequestsToPlot);
      }
    };
  </script>
  <!-- Google Maps JS API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcWQBQEDw_9_YXamLaiJPijzMpy0T6Vhw&callback=initAuthorityMap"
    async defer>
  </script>

  <script type="module" src="js/authority.js"></script>
  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
