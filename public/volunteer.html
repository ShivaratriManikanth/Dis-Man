<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Dashboard — Smart Disaster Response</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* Volunteer-specific overrides */
    .navbar { background: #2a7d4f; }

    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 9px 22px;
      border: 2px solid #2a7d4f;
      border-radius: 8px;
      background: transparent;
      color: #2a7d4f;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: #2a7d4f;
      color: #fff;
    }
    .tab-btn:hover:not(.active) {
      background: #e8f5ee;
    }

    .task-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-left: 5px solid #e63946;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .task-card.completed {
      border-left-color: #2dc653;
      opacity: 0.8;
    }
    .task-card .task-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .task-card .task-type {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #e63946;
    }
    .task-card.completed .task-type { color: #2dc653; }
    .task-card h3 {
      font-size: 1rem;
      color: #1d3557;
      margin: 4px 0 10px;
    }
    .task-card p {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.55;
      margin-bottom: 14px;
    }
    .task-detail-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.82rem;
      color: #777;
      margin-bottom: 16px;
    }
    .task-detail-row span {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f8f9fa;
      padding: 4px 10px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="brand">
      <span class="icon">🤝</span>
      Volunteer Portal
    </div>
    <nav>
      <a href="volunteer.html">My Tasks</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="page-wrapper">

    <div class="welcome-banner" style="background: linear-gradient(135deg, #2a7d4f, #52b788);">
      <div>
        <h2 id="volunteerName">Welcome, Volunteer!</h2>
        <p>You are making a difference. View and complete your assigned tasks below.</p>
      </div>
      <span class="welcome-icon">🤝</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card" style="border-top-color:#2a7d4f;">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">My Tasks</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-number" id="statPending">—</div>
        <div class="stat-label">My Pending</div>
      </div>
      <div class="stat-card green">
        <div class="stat-number" id="statCompleted">—</div>
        <div class="stat-label">My Completed</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-number" id="statAvailable">—</div>
        <div class="stat-label">Available</div>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabMine" onclick="switchTab('mine')">📋 My Tasks</button>
      <button class="tab-btn" id="tabAvailable" onclick="switchTab('available')">🔓 Available Tasks</button>
    </div>

    <!-- Filter -->
    <div class="section-header">
      <h2 id="taskSectionTitle">My Assigned Tasks</h2>
      <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="filter-bar" style="margin-bottom:20px;">
      <select id="filterStatus">
        <option value="all">All Statuses</option>
        <option value="Pending">Pending Only</option>
        <option value="Completed">Completed Only</option>
      </select>
      <select id="filterSeverity">
        <option value="all">All Severities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="filterType">
        <option value="all">All Types</option>
        <option value="Flood">Flood</option>
        <option value="Fire">Fire</option>
        <option value="Earthquake">Earthquake</option>
        <option value="Cyclone">Cyclone</option>
        <option value="Medical Emergency">Medical Emergency</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div id="alertBox"></div>
    <div id="loadingSpinner" class="spinner"></div>
    <div id="tasksContainer">
      <!-- Tasks injected here -->
    </div>

  </main>

  <!-- Google Maps JS API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcWQBQEDw_9_YXamLaiJPijzMpy0T6Vhw"
    async defer>
  </script>

  <script type="module" src="js/volunteer.js"></script>
  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
